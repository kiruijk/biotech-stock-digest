name: Update Stock Data Daily

on:
  push:
    branches:
      - main

  schedule:
    # Run daily at 4:15 PM ET (8:15 PM UTC) on weekdays
    - cron: "15 20 * * MON-FRI"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run stock update script
        run: node update-stocks.js

      - name: Commit and push changes
        run: |
          git config --local user.name "Stock Bot"
          git config --local user.email "bot@github.com"
          git add index.html vktx.html iova.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Update stock prices and news - $(date +'%Y-%m-%d %H:%M:%S')"
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
          fi
